{{- if .Values.secrets.apiKeys }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hebbs.fullname" . }}-secrets
  labels:
    {{- include "hebbs.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.apiKeys }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
