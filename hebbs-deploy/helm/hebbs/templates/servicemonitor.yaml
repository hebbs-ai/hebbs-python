{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "hebbs.fullname" . }}
  labels:
    {{- include "hebbs.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "hebbs.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /v1/metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
